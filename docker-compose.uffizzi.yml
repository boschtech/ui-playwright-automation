# docker-compose.uffizzi.yml
# Uffizzi uses this to spin up an ephemeral preview environment
# containing all three services before Render deployment.

x-uffizzi:
  ingress:
    service: micro-frontend
    port: 80

services:
  product-service:
    image: ghcr.io/boschtech/product-service:${PRODUCT_SERVICE_SHA:-latest}
    environment:
      - CORS_ALLOWED_ORIGINS=*
      - ORDER_SERVICE_URL=http://order-service:8081
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M

  order-service:
    image: ghcr.io/boschtech/order-service:${ORDER_SERVICE_SHA:-latest}
    environment:
      - CORS_ALLOWED_ORIGINS=*
      - PRODUCT_SERVICE_URL=http://product-service:8080
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M

  micro-frontend:
    build:
      context: https://github.com/boschtech/micro-frontend.git#${MICRO_FRONTEND_SHA:-main}
      dockerfile_inline: |
        FROM node:20-alpine AS build
        WORKDIR /app
        COPY package.json package-lock.json ./
        RUN npm ci
        COPY . .
        ENV VITE_PRODUCT_SERVICE_URL=http://product-service:8080
        ENV VITE_ORDER_SERVICE_URL=http://order-service:8081
        RUN npm run build
        FROM nginx:alpine
        COPY --from=build /app/dist /usr/share/nginx/html
        RUN printf 'server {\n  listen 80;\n  root /usr/share/nginx/html;\n  index index.html;\n  location / {\n    try_files $$uri $$uri/ /index.html;\n  }\n}\n' > /etc/nginx/conf.d/default.conf
        EXPOSE 80
    ports:
      - "80:80"
    depends_on:
      - product-service
      - order-service
    deploy:
      resources:
        limits:
          memory: 256M
