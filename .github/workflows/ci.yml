name: UI Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow other repos to trigger this workflow
  workflow_dispatch:
    inputs:
      test_grep:
        description: "Playwright --grep filter (e.g. @product-service, @order-service, or empty for all)"
        required: false
        default: ""
      preview_url:
        description: "Preview URL to test against (skips local docker compose if provided)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Single stage: bring the stack up via Docker Compose on the
  # runner, run Playwright against http://localhost, then tear it
  # down. No external preview-env service is required.
  # ────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # Compose reads this natively; both files are applied in order.
      COMPOSE_FILE: docker-compose.uffizzi.yml:docker-compose.ci.override.yml

    steps:
      - name: Checkout ui-playwright-automation
        uses: actions/checkout@v4

      # Sibling service repos. If any of them are private, set a
      # CROSS_REPO_TOKEN repo secret to a PAT/App token with `repo`
      # (read) scope on those repos; otherwise the default GITHUB_TOKEN
      # is used and must have access.
      - name: Checkout product-service
        if: ${{ github.event.inputs.preview_url == '' }}
        uses: actions/checkout@v4
        with:
          repository: boschtech/product-service
          path: services/product-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout order-service
        if: ${{ github.event.inputs.preview_url == '' }}
        uses: actions/checkout@v4
        with:
          repository: boschtech/order-service
          path: services/order-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout micro-frontend
        if: ${{ github.event.inputs.preview_url == '' }}
        uses: actions/checkout@v4
        with:
          repository: boschtech/micro-frontend
          path: services/micro-frontend
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start stack with Docker Compose
        if: ${{ github.event.inputs.preview_url == '' }}
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Wait for frontend to be healthy
        if: ${{ github.event.inputs.preview_url == '' }}
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost > /dev/null 2>&1; then
              echo "✅ Frontend is responding"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 5
          done
          echo "❌ Frontend did not respond in time"
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Resolve base URL
        id: resolve-url
        run: |
          if [ -n "${{ github.event.inputs.preview_url }}" ]; then
            echo "url=${{ github.event.inputs.preview_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright Tests
        env:
          E2E_BASE_URL: ${{ steps.resolve-url.outputs.url }}
          CI: true
        run: |
          GREP="${{ github.event.inputs.test_grep }}"
          if [ -n "$GREP" ]; then
            npx playwright test --grep "$GREP"
          else
            npx playwright test
          fi

      - name: Dump compose logs on failure
        if: failure() && github.event.inputs.preview_url == ''
        run: docker compose logs --no-color

      - name: Tear down Docker Compose
        if: always() && github.event.inputs.preview_url == ''
        run: docker compose down -v --remove-orphans

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
